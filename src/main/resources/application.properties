spring.application.name=proyecto
server.port=8081

# --- CONFIGURACI”N DE H2 ---
# URL de la base de datos en memoria (proyectodb es el nombre que elegimos)
spring.datasource.url=jdbc:h2:mem:proyectodb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- CONFIGURACI”N DE JPA / HIBERNATE ---
# Dialecto especÌfico para H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# 'update' crea las tablas autom·ticamente bas·ndose en tus clases @Entity
spring.jpa.hibernate.ddl-auto=create-drop
# Muestra las consultas SQL en la consola (muy ˙til para debug)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- CONSOLA H2 ---
# Habilita la interfaz web en http://localhost:8081/h2-console
spring.h2.console.enabled=true
# Permite que la consola se vea dentro de frames (necesario para el navegador)
spring.core.design.allow-bean-definition-overriding=true
spring.h2.console.settings.web-allow-others=true