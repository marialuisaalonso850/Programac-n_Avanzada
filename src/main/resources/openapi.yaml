openapi: 3.1.0
info:
  title: API Sistema de Triage y Gestión de Solicitudes Académicas
  description: |
    API RESTful para la gestión estructurada de solicitudes académicas.
    **Dominio:** Gestión de Solicitudes Académicas
    **Agregado Principal:** Solicitud
  version: 1.0.0
  contact:
    name: Programa de Ingeniería de Sistemas
    email: sistemas@uniquindio.edu.co

servers:
  - url: http://localhost:8080
    description: Servidor de desarrollo local
  - url: https://api-triage.uniquindio.edu.co
    description: Servidor de producción

tags:
  - name: Solicitudes
    description: Gestión del agregado Solicitud
  - name: Tipos de Solicitud
    description: Catálogo de tipos de solicitud
  - name: Usuarios
    description: Gestión de usuarios del sistema

paths:
  /api/solicitudes:
    post:
      tags:
        - Solicitudes
      summary: Crear una nueva solicitud
      description: |
        Registra una nueva solicitud en estado REGISTRADA.
        Mapea a la operación del dominio: `Solicitud.crear()`
      operationId: crearSolicitud
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrearSolicitudRequest'
            example:
              tipoSolicitudId: 1
              descripcion: "Solicito homologación de la asignatura Programación I cursada..."
              canalOrigen: CORREO_ELECTRONICO
      responses:
        '201':
          description: Solicitud creada exitosamente
          headers:
            Location:
              description: URI de la solicitud creada
              schema:
                type: string
                example: /api/solicitudes/507f1f77bcf86cd799439011
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudDetalleResponse'
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: No autenticado

    get:
      tags:
        - Solicitudes
      summary: Listar solicitudes (con paginación y filtros)
      operationId: listarSolicitudes
      parameters:
        - name: estado
          in: query
          schema:
            $ref: '#/components/schemas/EstadoSolicitud'
        - name: prioridad
          in: query
          schema:
            $ref: '#/components/schemas/Prioridad'
        - name: solicitanteId
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Lista de solicitudes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginaSolicitudes'

  /api/solicitudes/{id}:
    get:
      tags:
        - Solicitudes
      summary: Obtener detalle de una solicitud
      operationId: obtenerSolicitudPorId
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Detalle de la solicitud
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudDetalleResponse'
        '404':
          description: Solicitud no encontrada

  /api/solicitudes/{id}/clasificar:
    put:
      tags:
        - Solicitudes
      summary: Clasificar una solicitud
      operationId: clasificarSolicitud
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClasificarSolicitudRequest'
      responses:
        '200':
          description: Solicitud clasificada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudDetalleResponse'

  /api/solicitudes/{id}/asignar:
    put:
      tags:
        - Solicitudes
      summary: Asignar responsable
      operationId: asignarResponsable
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AsignarResponsableRequest'
      responses:
        '200':
          description: Responsable asignado exitosamente

  /api/solicitudes/{id}/estado:
    patch:
      tags:
        - Solicitudes
      summary: Cambiar estado
      operationId: cambiarEstado
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CambiarEstadoRequest'
      responses:
        '200':
          description: Estado cambiado exitosamente

  /api/solicitudes/{id}/historial:
    get:
      tags:
        - Solicitudes
      summary: Obtener historial
      operationId: obtenerHistorial
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Historial de la solicitud
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventoHistorialResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # Request DTOs
    CrearSolicitudRequest:
      type: object
      required: [tipoSolicitudId, descripcion, canalOrigen]
      properties:
        tipoSolicitudId:
          type: integer
          format: int64
        descripcion:
          type: string
          minLength: 20
          maxLength: 1000
        canalOrigen:
          $ref: '#/components/schemas/CanalOrigen'

    ClasificarSolicitudRequest:
      type: object
      required: [tipoSolicitudId, prioridad, justificacion]
      properties:
        tipoSolicitudId:
          type: integer
          format: int64
        prioridad:
          $ref: '#/components/schemas/PrioridadDTO'
        justificacion:
          type: string
          minLength: 10
          maxLength: 500

    AsignarResponsableRequest:
      type: object
      required: [responsableId]
      properties:
        responsableId:
          type: string

    CambiarEstadoRequest:
      type: object
      required: [nuevoEstado, observacion]
      properties:
        nuevoEstado:
          $ref: '#/components/schemas/EstadoSolicitud'
        observacion:
          type: string
          maxLength: 500

    # Response DTOs
    SolicitudDetalleResponse:
      type: object
      properties:
        id:
          type: string
        codigo:
          type: string
        tipo:
          $ref: '#/components/schemas/TipoSolicitudDTO'
        descripcion:
          type: string
        canalOrigen:
          $ref: '#/components/schemas/CanalOrigen'
        estado:
          $ref: '#/components/schemas/EstadoSolicitud'
        prioridad:
          $ref: '#/components/schemas/PrioridadDTO'
        solicitante:
          $ref: '#/components/schemas/UsuarioResumenDTO'
        responsable:
          $ref: '#/components/schemas/UsuarioResumenDTO'
        fechaCreacion:
          type: string
          format: date-time

    EventoHistorialResponse:
      type: object
      properties:
        secuencia:
          type: integer
        fechaHora:
          type: string
          format: date-time
        accion:
          $ref: '#/components/schemas/TipoAccion'
        usuarioNombre:
          type: string
        observacion:
          type: string

    PaginaSolicitudes:
      type: object
      properties:
        contenido:
          type: array
          items:
            $ref: '#/components/schemas/SolicitudResumenResponse'
        paginaActual:
          type: integer
        totalPaginas:
          type: integer

    SolicitudResumenResponse:
      type: object
      properties:
        id:
          type: string
        codigo:
          type: string
        estado:
          $ref: '#/components/schemas/EstadoSolicitud'
        prioridad:
          $ref: '#/components/schemas/Prioridad'

    # Objetos de Valor
    PrioridadDTO:
      type: object
      required: [nivel, justificacion]
      properties:
        nivel:
          $ref: '#/components/schemas/Prioridad'
        justificacion:
          type: string

    TipoSolicitudDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        nombre:
          type: string

    UsuarioResumenDTO:
      type: object
      properties:
        id:
          type: string
        nombreCompleto:
          type: string

    # Enums
    EstadoSolicitud:
      type: string
      enum: [REGISTRADA, CLASIFICADA, ASIGNADA, EN_ATENCION, ATENDIDA, CERRADA]

    Prioridad:
      type: string
      enum: [CRITICA, ALTA, MEDIA, BAJA]

    CanalOrigen:
      type: string
      enum: [CSU, CORREO_ELECTRONICO, SAC, PRESENCIAL, TELEFONICO, WEB]

    TipoAccion:
      type: string
      enum: [CREACION, CLASIFICACION, ASIGNACION, CAMBIO_ESTADO, PRIORIZACION, CIERRE]

    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        mensaje:
          type: string