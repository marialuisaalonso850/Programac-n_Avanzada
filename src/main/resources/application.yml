server:
  port: 8080

spring:
  security:
    user:
      name: disabled
      password: disabled

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  mvc:
    pathmatch:
      matching-strategy:
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        trace: false
        web-allow-others: false
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    config-url: /v3/api-docs/swagger-config
    url: /v3/api-docs
    tags-sorter: alpha
    operations-sorter: method

jwt:
  secret: "clave-super-secreta-que-debe-tener-al-menos-32-caracteres-para-HS256"
  expiration: 86400000